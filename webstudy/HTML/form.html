<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>
<body>
    <form action="main.py" method="post" enctype="multipart/form-data">
        <label for="username">username </label>
        <input type="text" id="username" placeholder="user123" minlength="2"  maxlength="15" required> <br>
        <label for="password">password</label>
        <input type="password"  id="password"min="6" required><br>

        <label for="email">Email</label>
        <input type="email" id="email",placeholder="abc@gmail.com"><br>

        <label for="phone">phone #</label>
        <input type="tel" id="phone"placeholder="123-456-7890" ><br>

        <label for="date">DOB</label>
        <input type="date" id="date"><br>
        <label for="quantity">quantity</label>
        <input type="number" id="quantity" min="0" max="999" value="1">
        <br>
        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." name="title">
        <label for="Ms.">Ms.</label>
        <input type="radio" id="Ms." name="title">
        <label for="PhD.">PhD.</label>
        <input type="radio" id="PhD." name="title">

<br>
        <label for="payment">payment</label>
        <select name="option" id="op">
            <option value="visa">visa</option>
            <option value="mastercard">mastercard</option>
            <option value="giftcard">giftcard</option>

        </select><br>

        <label for="subscribe">subscribe</label>
        <input type="checkbox" id="subscribe"><br>

        <label for="comment">comment</label>
        <textarea id="comment" rows="3" cols="25"></textarea>
        <br>

        <label for="file">file </label>
        <input type="file" id =file accept="image/png, image/jpeg">
        
        <input type="reset"><br>
        <input type="submit">
    </form>
</body>
</html>
